<div class="auth-container">
    <div class="auth-card">
        <h2>Criar Conta</h2>
        <p>Cadastre-se para favoritar notícias e personalizar seu portal.</p>

        <div *ngIf="errorMessage" class="error-alert">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="OnSubmit()">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="name" [(ngModel)]="user.name" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" [(ngModel)]="user.email" placeholder="Digite seu e-mail">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" [(ngModel)]="user.password" placeholder="Crie uma senha">
            </div>

            <button type="submit" class="btn-auth">Cadastrar</button>
        </form>

        <p class="auth-redirect">
            Já tem uma conta? <a routerLink="/login">Faça Login</a>
        </p>
    </div>
</div>
